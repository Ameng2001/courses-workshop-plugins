<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教研工坊 V2.4 · Import Project</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="create-import">
    <div class="shell">
      <aside class="sidebar"></aside>
      <main class="main"></main>
      <aside class="rail">
        <div class="modal-overlay">
          <section class="modal-card">
            <div class="modal-header">
              <h2>导入已有课程资料</h2>
              <p>把客户模板、往期主题包、单活动教案或样例资料转成可继续推进的课程 project。</p>
            </div>
            <div class="form-list">
              <div class="field"><label>新建 project 名称</label><input value="多样的服饰-客户版" /></div>
              <div class="field"><label>导入文件</label><div class="dropzone">选择 PDF / Word / markdown / 素材目录</div></div>
              <div class="field"><label>资料类型</label><input value="客户模板 + 终版主题包" /></div>
            </div>
            <div class="modal-actions">
              <a class="ghost-button" href="./create-project.html">Back</a>
              <a class="ghost-button" href="./index.html">Cancel</a>
              <a class="cta-button" href="./studio-thread.html">Create</a>
            </div>
          </section>
        </div>
      </aside>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
